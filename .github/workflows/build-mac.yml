name: Build macOS Release

# 允许手动触发工作流
on: 
  workflow_dispatch:

jobs:
  build:
    # 使用 GitHub 提供的免费 macOS 虚拟机
    runs-on: macos-latest

    steps:
      # 1. 获取源码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. 开启 macOS 编译支持并获取依赖
      - name: Install dependencies
        run: |
          flutter config --enable-macos-desktop
          cd simple_live_app
          flutter pub get

      # 4. 编译 macOS 应用
      - name: Build macOS app
        run: |
          cd simple_live_app
          flutter build macos --release

      # 5. 打包应用以保留权限
      - name: Zip the app bundle
        run: |
          cd simple_live_app/build/macos/Build/Products/Release/
          zip -r simple_live_app_macOS.zip simple_live_app.app

      # 6. 上传编译好的文件供你下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App-Release
          path: simple_live_app/build/macos/Build/Products/Release/simple_live_app_macOS.zip
