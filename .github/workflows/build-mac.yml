name: Build macOS Release

on: 
  workflow_dispatch:

jobs:
  build:
    # 强制使用最新的 macOS 14 (M1 芯片) 环境，自带较新版本的 Xcode SDK
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Deployment Target & Install dependencies
        run: |
          flutter config --enable-macos-desktop
          cd simple_live_app
          
          # 关键修复：强制将 macOS 最低部署版本从 10.11 提升到 10.14
          find macos -type f -name "project.pbxproj" -exec sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = 10.[0-9]*/MACOSX_DEPLOYMENT_TARGET = 10.14/g' {} +
          find macos -type f -name "Podfile" -exec sed -i '' 's/platform :osx, .*/platform :osx, "10.14"/g' {} +
          
          flutter pub get

      - name: Build macOS app
        run: |
          cd simple_live_app
          flutter build macos --release

      - name: Zip the app bundle
        run: |
          cd simple_live_app/build/macos/Build/Products/Release/
          zip -r simple_live_app_macOS.zip simple_live_app.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App-Release
          path: simple_live_app/build/macos/Build/Products/Release/simple_live_app_macOS.zip
